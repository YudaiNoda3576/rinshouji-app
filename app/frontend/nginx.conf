# フロントエンド配信用 nginx 設定。
# 静的ファイルを配信しつつ、/api/* は同一オリジンのままバックエンドへプロキシして CORS を回避する。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API リクエストはバックエンド (Hono) へ転送する。
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ハッシュ付きアセットは内容が変わればファイル名も変わるため、長期キャッシュしてよい。
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html はキャッシュさせない（キャッシュされると古いバンドルを参照し続け、
    # デプロイ後もブラウザに旧 UI が表示され続けるため）。
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # 静的ファイル。見つからなければ index.html へフォールバックする。
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
