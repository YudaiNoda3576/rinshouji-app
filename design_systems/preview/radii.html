<!doctype html>
<!-- @dsCard group="Spacing" name="Radius scale" subtitle="sm 4 · md 6 · lg 8 · xl 12 · full" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-items:end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:64px;height:64px;background:#DBEAFE;border:1px solid #2563EB}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--fg2);text-align:center}
  .name b{display:block;font-family:var(--font-sans);color:var(--fg1);margin-bottom:2px}
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name"><b>sm · 4px</b>chips</div></div>
    <div class="cell"><div class="box" style="border-radius:6px"></div><div class="name"><b>md · 6px</b>buttons · inputs</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name"><b>lg · 8px</b>cards (base)</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="name"><b>xl · 12px</b>large dialogs</div></div>
    <div class="cell"><div class="box" style="border-radius:9999px"></div><div class="name"><b>full</b>avatars · badges</div></div>
  </div>
</body></html>
