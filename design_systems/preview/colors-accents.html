<!doctype html>
<!-- @dsCard group="Colors" name="Domain accents" subtitle="Four temple-* accent colors keyed to product domains" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
  .sw{flex:1;min-width:130px;display:flex;flex-direction:column;border-radius:8px;overflow:hidden;border:1px solid var(--border-default)}
  .chip{height:80px;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:600;font-size:13px}
  .meta{padding:10px 12px;background:#fff}
  .meta .name{font-size:13px;font-weight:600;color:var(--fg1)}
  .meta .hex{font-size:11px;color:var(--fg2);font-family:var(--font-mono);margin-top:2px}
  .meta .role{font-size:11px;color:var(--fg2);margin-top:4px}
</style></head><body>
  <div class="sw"><div class="chip" style="background:#2563EB">温</div><div class="meta"><div class="name">temple-blue</div><div class="hex">#2563EB</div><div class="role">Visits · Primary action</div></div></div>
  <div class="sw"><div class="chip" style="background:#059669">檀</div><div class="meta"><div class="name">temple-green</div><div class="hex">#059669</div><div class="role">Parishioners (檀家)</div></div></div>
  <div class="sw"><div class="chip" style="background:#7C3AED">過</div><div class="meta"><div class="name">temple-purple</div><div class="hex">#7C3AED</div><div class="role">Memorial · 過去帳</div></div></div>
  <div class="sw"><div class="chip" style="background:#DC2626">務</div><div class="meta"><div class="name">temple-red</div><div class="hex">#DC2626</div><div class="role">Staff · Destructive</div></div></div>
</body></html>
