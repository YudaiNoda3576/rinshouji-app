<!doctype html>
<!-- @dsCard group="Brand" name="Logo lockup" subtitle="Primary mark and source-canonical mark side by side" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .lockup{display:flex;align-items:center;gap:18px;padding:18px;border:1px solid hsl(215 28% 90%);border-radius:8px;background:#fff}
  .lockup .mark{flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center}
  .lockup .mark.blue{width:80px;height:80px;background:#2563EB}
  .lockup .mark.line{width:80px;height:80px;background:hsl(215 28% 96%);padding:8px;box-sizing:border-box}
  .lockup .mark img{width:100%;height:100%;object-fit:contain}
  .lockup .text{display:flex;flex-direction:column;gap:4px;min-width:0}
  .lockup .name{font-size:18px;font-weight:600;color:var(--fg1)}
  .lockup .sub{font-size:12px;color:var(--fg2);font-family:var(--font-mono)}
</style></head><body>
  <div class="lockup">
    <div class="mark blue"><img src="../assets/logo-mark-white.png" alt="Temple Admin mark"></div>
    <div class="text">
      <div class="name">寺院管理システム</div>
      <div class="sub">Primary mark · white on temple-blue</div>
    </div>
  </div>
  <div class="lockup">
    <div class="mark line"><img src="../assets/logo-mark-source.png" alt="Temple Admin source line art"></div>
    <div class="text">
      <div class="name">寺院管理システム</div>
      <div class="sub">Source canonical · line art (Buddhist hall お堂)</div>
    </div>
  </div>
</body></html>
