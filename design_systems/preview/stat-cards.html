<!doctype html>
<!-- @dsCard group="Components" name="Stat cards" subtitle="Domain-coded icon tiles with label + value" viewport="700x140" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#F9FAFB;color:var(--fg1);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .card{background:#fff;border:1px solid hsl(215 28% 90%);border-radius:8px;padding:18px;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05);display:flex;align-items:center;gap:14px}
  .icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}
  .icon svg{width:20px;height:20px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .label{font-size:13px;font-weight:500;color:var(--fg2)}
  .value{font-size:24px;font-weight:600;color:var(--fg1);line-height:1.1;margin-top:2px;font-feature-settings:'tnum'}
</style></head><body>
  <div class="grid">
    <div class="card"><div class="icon" style="background:#DBEAFE"><svg viewBox="0 0 24 24" stroke="#2563EB"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg></div><div><div class="label">本日のお参り</div><div class="value">12</div></div></div>
    <div class="card"><div class="icon" style="background:#D1FAE5"><svg viewBox="0 0 24 24" stroke="#059669"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="label">檀家総数</div><div class="value">248</div></div></div>
    <div class="card"><div class="icon" style="background:#EDE9FE"><svg viewBox="0 0 24 24" stroke="#7C3AED"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></div><div><div class="label">過去帳記録数</div><div class="value">1,432</div></div></div>
    <div class="card"><div class="icon" style="background:#FEE2E2"><svg viewBox="0 0 24 24" stroke="#DC2626"><path d="M2 21a8 8 0 0 1 13.292-6"/><circle cx="10" cy="8" r="5"/><path d="m16 19 2 2 4-4"/></svg></div><div><div class="label">寺務員数</div><div class="value">6</div></div></div>
  </div>
</body></html>
