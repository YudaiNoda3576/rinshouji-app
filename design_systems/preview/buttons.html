<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="default · outline · ghost · destructive · link · icon" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1);font-family:var(--font-sans)}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border-radius:6px;font-size:14px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:background-color .15s;font-family:inherit}
  .btn svg{width:16px;height:16px;stroke-width:2;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .btn-default{background:#2563EB;color:#fff}
  .btn-default:hover{background:#1D4ED8}
  .btn-outline{background:#fff;color:var(--fg1);border-color:hsl(215 28% 90%)}
  .btn-outline:hover{background:hsl(215 28% 96%)}
  .btn-ghost{background:transparent;color:var(--fg1)}
  .btn-ghost:hover{background:hsl(215 28% 96%)}
  .btn-destructive{background:#DC2626;color:#fff}
  .btn-destructive:hover{background:#B91C1C}
  .btn-link{background:transparent;color:#2563EB;padding:0 4px}
  .btn-link:hover{text-decoration:underline;text-underline-offset:4px}
  .btn-sm{height:36px;padding:0 12px;font-size:13px}
  .btn-icon{width:40px;padding:0;justify-content:center}
</style></head><body>
  <div class="row">
    <button class="btn btn-default"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>新規お参り記録</button>
    <button class="btn btn-outline"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>新規檀家登録</button>
    <button class="btn btn-ghost">キャンセル</button>
    <button class="btn btn-destructive">削除</button>
  </div>
  <div class="row">
    <button class="btn btn-default btn-sm">保存</button>
    <button class="btn btn-outline btn-sm">編集</button>
    <button class="btn btn-ghost btn-sm">すべて表示 <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
    <button class="btn btn-link">新規登録</button>
    <button class="btn btn-outline btn-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
  </div>
</body></html>
