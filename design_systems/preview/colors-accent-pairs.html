<!doctype html>
<!-- @dsCard group="Colors" name="Accent tints & hovers" subtitle="Each accent has a 100-tint background and a hover-deeper press color" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .row{display:flex;flex-direction:column;border-radius:8px;border:1px solid var(--border-default);overflow:hidden}
  .pair{display:grid;grid-template-columns:1fr 1fr;height:64px}
  .swatch{display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-mono);font-weight:600}
  .meta{padding:10px 12px;background:#fff}
  .meta .name{font-size:13px;font-weight:600;color:var(--fg1)}
  .meta .role{font-size:11px;color:var(--fg2);margin-top:2px}
</style></head><body>
  <div class="row">
    <div class="pair"><div class="swatch" style="background:#DBEAFE;color:#1E3A8A">tint</div><div class="swatch" style="background:#1D4ED8;color:#fff">hover</div></div>
    <div class="meta"><div class="name">temple-blue</div><div class="role">tint #DBEAFE · hover #1D4ED8</div></div>
  </div>
  <div class="row">
    <div class="pair"><div class="swatch" style="background:#D1FAE5;color:#064E3B">tint</div><div class="swatch" style="background:#047857;color:#fff">hover</div></div>
    <div class="meta"><div class="name">temple-green</div><div class="role">tint #D1FAE5 · hover #047857</div></div>
  </div>
  <div class="row">
    <div class="pair"><div class="swatch" style="background:#EDE9FE;color:#4C1D95">tint</div><div class="swatch" style="background:#6D28D9;color:#fff">hover</div></div>
    <div class="meta"><div class="name">temple-purple</div><div class="role">tint #EDE9FE · hover #6D28D9</div></div>
  </div>
  <div class="row">
    <div class="pair"><div class="swatch" style="background:#FEE2E2;color:#7F1D1D">tint</div><div class="swatch" style="background:#B91C1C;color:#fff">hover</div></div>
    <div class="meta"><div class="name">temple-red</div><div class="role">tint #FEE2E2 · hover #B91C1C</div></div>
  </div>
</body></html>
