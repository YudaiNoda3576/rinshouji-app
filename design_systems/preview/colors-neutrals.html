<!doctype html>
<!-- @dsCard group="Colors" name="Neutral surfaces" subtitle="Cool-gray scale — canvas, surface, muted, borders, fg layers" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:6px;border:1px solid var(--border-default);overflow:hidden;display:flex;flex-direction:column}
  .chip{height:62px}
  .meta{padding:8px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--fg2);background:#fff}
  .meta b{display:block;font-family:var(--font-sans);font-size:12px;color:var(--fg1);font-weight:600;margin-bottom:2px}
</style></head><body>
  <div class="sw"><div class="chip" style="background:hsl(210 11% 98%);border-bottom:1px solid var(--border-default)"></div><div class="meta"><b>--bg-canvas</b>gray-50</div></div>
  <div class="sw"><div class="chip" style="background:#fff;border-bottom:1px solid var(--border-default)"></div><div class="meta"><b>--bg-surface</b>card / white</div></div>
  <div class="sw"><div class="chip" style="background:hsl(215 28% 96%);border-bottom:1px solid var(--border-default)"></div><div class="meta"><b>--bg-muted</b>hover gray</div></div>
  <div class="sw"><div class="chip" style="background:hsl(215 28% 90%)"></div><div class="meta"><b>--border</b>1px divider</div></div>
  <div class="sw"><div class="chip" style="background:hsl(215 16% 47%)"></div><div class="meta"><b>--fg2</b>secondary text</div></div>
  <div class="sw"><div class="chip" style="background:hsl(224 71% 4%)"></div><div class="meta"><b>--fg1</b>primary text · sidebar-dark</div></div>
</body></html>
