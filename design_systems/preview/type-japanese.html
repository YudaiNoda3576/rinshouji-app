<!doctype html>
<!-- @dsCard group="Type" name="Japanese coverage" subtitle="Kanji · hiragana · katakana · tabular numerics" viewport="700x220" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

  <div class="row"><div class="tag">hiragana</div><div class="sample">おまいり だんか かこちょう かいみょう</div></div>

  <div class="row"><div class="tag">latin · digits</div><div class="sample" style="font-feature-settings:'tnum'">2025/04/12 · 14:30 · ¥10,000</div><div class="note">tabular-nums</div></div>
