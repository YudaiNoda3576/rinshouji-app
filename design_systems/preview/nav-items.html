<!doctype html>
<!-- @dsCard group="Components" name="Sidebar navigation items" subtitle="Light & dark sidebar variants with active state" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:18px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:18px;font-family:var(--font-sans)}
  .panel{background:#fff;border:1px solid hsl(215 28% 90%);border-radius:8px;padding:10px}
  .panel.dark{background:hsl(224 71% 4%);border-color:hsl(215 28% 17%)}
  .panel h5{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:hsl(215 16% 47%);margin:6px 8px 10px}
  .panel.dark h5{color:hsl(215 28% 65%)}
  .item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:6px;font-size:14px;font-weight:500;color:var(--fg1);margin-bottom:2px;cursor:pointer}
  .panel.dark .item{color:#fff}
  .item svg{width:20px;height:20px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke:currentColor}
  .item:hover{background:hsl(215 28% 96%)}
  .panel.dark .item:hover{background:hsl(215 28% 17%)}
  .item.active{background:#2563EB;color:#fff}
  .panel.dark .item.active{background:#2563EB;color:#fff}
</style></head><body>
