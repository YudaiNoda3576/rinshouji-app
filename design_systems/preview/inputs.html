<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Default · with icon · focus · disabled with error" viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:14px;font-weight:500;color:var(--fg1)}
  .input{position:relative}
  .input input{width:100%;height:40px;border:1px solid hsl(215 28% 90%);border-radius:6px;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--fg1);box-sizing:border-box;transition:box-shadow .15s, border-color .15s;outline:none}
  .input input::placeholder{color:hsl(215 16% 47%)}
  .input input:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,0.2)}
  .input.has-icon input{padding-left:36px}
  .input svg{position:absolute;left:12px;top:12px;width:16px;height:16px;stroke:#9CA3AF;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .help-err{font-size:12px;color:#DC2626}
  .input-disabled input{background:hsl(215 28% 96%);color:hsl(215 16% 47%);cursor:not-allowed}
</style></head><body>
  <div class="field"><label>メールアドレス</label><div class="input has-icon"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input value="tanaka@example.com"></div></div>
  <div class="field"><label>パスワード</label><div class="input has-icon"><svg viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input type="password" placeholder="パスワードを入力"></div></div>
  <div class="field"><label>戒名</label><div class="input"><input placeholder="例: 釈宗一" style="border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,0.2)"></div></div>
  <div class="field"><label>命日</label><div class="input input-disabled"><input value="2024年4月12日" disabled></div><div class="help-err">正しい日付を入力してください</div></div>
</body></html>
