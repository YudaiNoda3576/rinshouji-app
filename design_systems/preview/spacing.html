<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base — 1 / 2 / 3 / 4 / 6 / 8 steps" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{background:#2563EB;border-radius:8px}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--fg2)}
  .name b{font-family:var(--font-sans);color:var(--fg1);display:block;margin-bottom:2px}
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="name"><b>1</b>4px</div></div>
    <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="name"><b>2</b>8px</div></div>
    <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="name"><b>3</b>12px</div></div>
    <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="name"><b>4</b>16px</div></div>
    <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="name"><b>6</b>24px</div></div>
    <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="name"><b>8</b>32px</div></div>
  </div>
</body></html>
