<!doctype html>
<!-- @dsCard group="Type" name="Type weights" subtitle="400 / 500 / 600 / 700 in Noto Sans JP" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#fff;color:var(--fg1)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .cell{padding:14px;border:1px solid var(--border-default);border-radius:8px;background:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:96px}
  .cell .demo{font-size:20px;color:var(--fg1)}
  .cell .label{font-family:var(--font-mono);font-size:10.5px;color:var(--fg2);margin-top:8px}
  .cell b{font-family:var(--font-sans)}
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="demo" style="font-weight:400">本日のお参り Aa</div><div class="label">400 · regular</div></div>
    <div class="cell"><div class="demo" style="font-weight:500">本日のお参り Aa</div><div class="label">500 · medium</div></div>
    <div class="cell"><div class="demo" style="font-weight:600">本日のお参り Aa</div><div class="label">600 · semibold</div></div>
    <div class="cell"><div class="demo" style="font-weight:700">本日のお参り Aa</div><div class="label">700 · bold</div></div>
  </div>
</body></html>
