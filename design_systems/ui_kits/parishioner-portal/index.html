<!doctype html>
<!-- @dsCard group="UI Kit — Parishioner Portal" name="Parishioner portal UI kit" subtitle="Login card + parishioner mypage on the soft blue→indigo gradient page" viewport="1280x800" -->
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Temple Admin — Parishioner Portal</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body{margin:0;background:linear-gradient(135deg,#EFF6FF,#E0E7FF);color:var(--fg1);font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
  .page{display:grid;grid-template-columns:440px 1fr;gap:24px;width:1180px;max-width:100%}

  /* Login card (left) */
  .login{background:#fff;border-radius:8px;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1),0 8px 10px -6px rgb(0 0 0 / 0.1);padding:32px;align-self:start}
  .login .top{text-align:center;margin-bottom:24px}
  .login .seal{width:64px;height:64px;border-radius:50%;background:#2563EB;color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .login .seal svg{width:32px;height:32px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .login h1{margin:0 0 6px;font-size:24px;font-weight:700;color:var(--fg1)}
  .login .lead{font-size:14px;color:var(--fg2);margin:0}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  .field label{font-size:14px;font-weight:500;color:var(--fg1)}
  .input{position:relative}
  .input input{width:100%;height:40px;border:1px solid hsl(215 28% 90%);border-radius:6px;padding:0 12px 0 36px;font-size:14px;font-family:inherit;background:#fff;color:var(--fg1);box-sizing:border-box;outline:none;transition:border-color .15s, box-shadow .15s}
  .input input:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,0.2)}
  .input input::placeholder{color:hsl(215 16% 47%)}
  .input svg{position:absolute;left:12px;top:12px;width:16px;height:16px;stroke:#9CA3AF;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .submit{width:100%;height:42px;background:#2563EB;color:#fff;border:0;border-radius:6px;font-size:14px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:inherit;transition:background-color .15s}
  .submit:hover{background:#1D4ED8}
  .submit svg{width:16px;height:16px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .footer-note{text-align:center;font-size:13px;color:var(--fg2);margin:18px 0 0}
  .alt-link{text-align:center;margin-top:14px}
  .alt-link a{font-size:13px;color:#2563EB;text-decoration:none}
  .alt-link a:hover{text-decoration:underline;text-underline-offset:4px}

  /* Dashboard preview (right) */
  .dash{background:#fff;border-radius:8px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1),0 4px 6px -4px rgb(0 0 0 / 0.1);overflow:hidden;align-self:start}
  .dash header{padding:24px 28px;border-bottom:1px solid hsl(215 28% 90%);display:flex;justify-content:space-between;align-items:flex-end}
  .dash header h2{margin:0;font-size:20px;font-weight:600}
  .dash header p{margin:4px 0 0;font-size:13px;color:var(--fg2)}
  .dash header .who{font-size:13px;color:var(--fg2)}
  .dash header .who b{display:block;font-weight:500;color:var(--fg1);font-size:14px}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:hsl(215 28% 90%)}
  .summary .cell{background:#fff;padding:18px 20px}
  .summary .l{font-size:12px;color:var(--fg2);font-weight:500}
  .summary .v{font-size:22px;font-weight:600;color:var(--fg1);margin-top:4px;font-feature-settings:'tnum'}
  .section{padding:20px 28px;border-top:1px solid hsl(215 28% 90%)}
  .section h3{margin:0 0 12px;font-size:14px;font-weight:600;color:var(--fg1)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid hsl(215 28% 95%);font-size:14px}
  .row:last-child{border-bottom:0}
  .row .name{color:var(--fg1)}
  .row .date{color:var(--fg2);font-feature-settings:'tnum'}
  .row .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;background:#EDE9FE;color:#4C1D95;margin-left:8px}
  .row .tag.blue{background:#DBEAFE;color:#1E3A8A}
</style>
</head>
<body>
<div class="page">
  <!-- Login card -->
  <section class="login" data-screen-label="Parishioner Login">
    <div class="top">
      <div class="seal"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <h1>檀家ログイン</h1>
      <p class="lead">檀家専用ページにアクセスするためにログインしてください</p>
    </div>
    <form onsubmit="event.preventDefault()">
      <div class="field">
        <label for="email">メールアドレス</label>
        <div class="input">
          <svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="email" type="email" placeholder="例: tanaka@example.com" value="tanaka@example.com">
        </div>
      </div>
      <div class="field">
        <label for="pw">パスワード</label>
        <div class="input">
          <svg viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="pw" type="password" placeholder="パスワードを入力" value="••••••••">
        </div>
      </div>
      <button class="submit" type="submit"><svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>ログイン</button>
    </form>
    <p class="footer-note">パスワードをお忘れの場合は、寺院にお問い合わせください</p>
    <div class="alt-link"><a href="#">スタッフログインはこちら</a></div>
  </section>

  <!-- Dashboard preview -->
  <section class="dash" data-screen-label="Parishioner Dashboard">
    <header>
      <div><h2>檀家マイページ</h2><p>佐藤家のご記録です</p></div>
      <div class="who"><b>佐藤 千恵子 様</b>檀家番号 #00248</div>
    </header>
    <div class="summary">
      <div class="cell"><div class="l">直近のお参り</div><div class="v">4月12日</div></div>
      <div class="cell"><div class="l">次の年忌法要</div><div class="v">7回忌</div></div>
      <div class="cell"><div class="l">記録された戒名</div><div class="v">3</div></div>
    </div>

    <div class="section">
      <h3>今後の予定</h3>
      <div class="row"><span class="name">月命日 法要<span class="tag blue">参拝</span></span><span class="date">5月12日 (月)</span></div>
      <div class="row"><span class="name">釈 浄信 七回忌<span class="tag">年忌</span></span><span class="date">6月18日 (水)</span></div>
      <div class="row"><span class="name">お盆 参拝<span class="tag blue">参拝</span></span><span class="date">8月13日 (水)</span></div>
    </div>

    <div class="section">
      <h3>お参り履歴</h3>
      <div class="row"><span class="name">月命日 法要</span><span class="date">4月12日 10:30</span></div>
      <div class="row"><span class="name">お彼岸</span><span class="date">3月20日 14:00</span></div>
      <div class="row"><span class="name">三回忌 法要</span><span class="date">2月18日 11:00</span></div>
    </div>
  </section>
</div>
</body>
</html>
